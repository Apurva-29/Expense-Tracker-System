<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Expense Tracker System</title>
  <meta name="description" content="Sign in to your Expense Tracker System account to manage your income, expenses, and financial reports." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card page-enter">
    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">💰</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your Expense Tracker account</p>
    </div>

    <!-- Alert -->
    <div id="loginAlert" class="alert" style="display:none;"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input id="loginEmail" type="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" class="form-control"
               placeholder="Enter your password" required autocomplete="current-password" />
      </div>

      <button type="submit" id="loginBtn" class="btn btn-primary btn-block" style="margin-top:.5rem;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
