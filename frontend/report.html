<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Report — Expense Tracker System</title>
  <meta name="description" content="View your monthly income and expense breakdown with category-wise analysis." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo-icon">💰</div>
      <span>Expense Tracker</span>
    </div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html"   class="nav-link">🏠 Dashboard</a></li>
      <li><a href="add-income.html"  class="nav-link">➕ Income</a></li>
      <li><a href="add-expense.html" class="nav-link">➖ Expense</a></li>
      <li><a href="report.html"      class="nav-link active">📊 Report</a></li>
    </ul>
    <div class="nav-user">
      <div class="avatar" id="navAvatar">U</div>
      <span id="navName">User</span>
      <button class="btn-logout" onclick="logout()" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container page-enter">

    <div class="page-header">
      <div>
        <h1>Monthly Report</h1>
        <p>Detailed breakdown of your finances</p>
      </div>
      <!-- Month Selector -->
      <div class="month-selector">
        <span>📅</span>
        <select id="reportMonth">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
        <select id="reportYear"></select>
        <button class="btn btn-primary" onclick="loadReport()" style="padding:.45rem .9rem;border-radius:20px;font-size:.85rem;">
          Go
        </button>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="report-summary">
      <div class="report-stat income-stat">
        <div class="rs-label">Total Income</div>
        <div class="rs-value" id="repIncome">₹0.00</div>
      </div>
      <div class="report-stat expense-stat">
        <div class="rs-label">Total Expense</div>
        <div class="rs-value" id="repExpense">₹0.00</div>
      </div>
      <div class="report-stat balance-stat">
        <div class="rs-label">Net Balance</div>
        <div class="rs-value" id="repBalance">₹0.00</div>
      </div>
    </div>

    <!-- Category Breakdowns -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">

      <!-- Income by Category -->
      <div class="card">
        <div class="card-header">
          <h2>💵 Income by Category</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Category</th>
                <th style="text-align:right;">Amount</th>
                <th style="text-align:right;">%</th>
              </tr>
            </thead>
            <tbody id="incomeCatBody">
              <tr><td colspan="3">
                <div class="empty-state"><div class="empty-icon">💵</div><p>No data</p></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Expense by Category -->
      <div class="card">
        <div class="card-header">
          <h2>💸 Expense by Category</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Category</th>
                <th style="text-align:right;">Amount</th>
                <th style="text-align:right;">%</th>
              </tr>
            </thead>
            <tbody id="expenseCatBody">
              <tr><td colspan="3">
                <div class="empty-state"><div class="empty-icon">💸</div><p>No data</p></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="js/report.js"></script>
</body>
</html>
